<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #2c3e50;
        }

        .folder-container {
            margin-top: 40px;
        }

        .folder {
            display: inline-block;
            width: 180px;
            padding: 20px;
            margin: 15px;
            background-color: #f4c542;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 5px gray;
        }

        .folder:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>

    <h1>Welcome to my Website!!</h1>

    <div class="folder-container">
        <div class="folder">📁 Web Technologies</div>
        <div class="folder">📁 Deep Learning</div>
    </div>

</body>
</html>
