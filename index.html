<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Resource Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */
header{
    background:linear-gradient(90deg,#004aad,#00b4d8);
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:36px;
}

/* Main Container */

.container{
    flex:1;
    display:flex;
}

/* Web Technologies Section */

.web-tech{
    width:50%;
    padding:30px;
    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');
    background-size:cover;
    color:white;
}

/* Deep Learning Section */

.deep-learning{
    width:50%;
    padding:30px;
    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1677442136019-21780ecad995');
    background-size:cover;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

/* Folder Design */

.folder{
    background:white;
    color:black;
    margin-bottom:20px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.folder h3{
    color:#004aad;
    margin-bottom:10px;
}

.subfolder{
    padding:10px;
    margin:10px 0;
    background:#f0f8ff;
    border-radius:6px;
}

button{
    padding:8px 15px;
    border:none;
    background:#004aad;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}

/* Footer */

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<header>
<h1>Welcome to My Website!!</h1>
<p>Learning Resources Portal</p>
</header>

<div class="container">

<!-- WEB TECHNOLOGIES -->

<div class="web-tech">

<h2>🌐 Web Technologies</h2>

<div class="folder">

<h3>📁 PPT</h3>

<div class="subfolder">
<input type="file">
</div>

<h3>📁 Notes</h3>

<div class="subfolder">
<input type="file">
</div>

<h3>📁 Practice Programs</h3>

<div class="subfolder">
<input type="file">
</div>

</div>

</div>

<!-- DEEP LEARNING -->

<div class="deep-learning">

<h2>🤖 Deep Learning</h2>

<div class="folder">

<h3>📁 PPT</h3>

<div class="subfolder">
<input type="file">
</div>

<h3>📁 Notes</h3>

<div class="subfolder">
<input type="file">
</div>

<h3>📁 Practice Programs</h3>

<div class="subfolder">
<input type="file">
</div>

</div>

</div>

</div>

<footer>
© 2026 Your Name. All Rights Reserved.
</footer>

</body>
</html>
