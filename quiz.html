<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Web Technologies Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --html:#E8511A;--css:#264DE4;--bs:#7952B3;
  --react:#0EA5E9;--node:#3C873A;--mongo:#13AA52;
  --navy:#1E3A5F;--white:#FFFFFF;--bg:#F0F4F8;
  --dark:#1F2937;--gray:#64748B;--lgray:#E2E8F0;
  --correct:#16A34A;--wrong:#DC2626;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);min-height:100vh}

/* ── HEADER ── */
.hero{background:linear-gradient(135deg,#1E3A5F 0%,#0C4A6E 100%);
  color:#fff;text-align:center;padding:40px 20px 32px}
.hero h1{font-size:clamp(1.5rem,4vw,2.4rem);font-weight:800}
.hero h1 span{color:#22D3EE}
.hero p{color:#BFDBFE;margin-top:8px;font-size:.95rem}
.topic-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:18px}
.pill{padding:4px 13px;border-radius:999px;font-size:.76rem;
  font-weight:700;color:#fff;letter-spacing:.4px}

/* ── QUIZ SHELL ── */
.shell{max-width:760px;margin:0 auto;padding:24px 16px 60px}

/* ── PROGRESS ── */
.progress-wrap{background:#fff;border-radius:12px;padding:18px 22px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.prog-meta{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px}
.prog-label{font-size:.85rem;color:var(--gray);font-weight:600}
.prog-score{font-size:.85rem;color:var(--navy);font-weight:700}
.prog-track{background:var(--lgray);border-radius:999px;height:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;
  background:linear-gradient(90deg,#0EA5E9,#22D3EE);
  transition:width .4s ease}
.topic-badge{display:inline-block;padding:3px 12px;border-radius:999px;
  font-size:.72rem;font-weight:700;color:#fff;margin-bottom:14px}

/* ── QUESTION CARD ── */
.card{background:#fff;border-radius:16px;padding:28px;
  box-shadow:0 4px 20px rgba(0,0,0,.09);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:.78rem;font-weight:700;color:var(--gray);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.6px}
.q-text{font-size:1.1rem;font-weight:700;color:var(--dark);line-height:1.5;
  margin-bottom:22px}

/* ── OPTIONS ── */
.options{display:grid;gap:11px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;
  border:2px solid var(--lgray);border-radius:10px;cursor:pointer;
  transition:border-color .15s,background .15s;background:#fff;
  font-size:.95rem;color:var(--dark);text-align:left;width:100%;
  font-family:inherit}
.opt:hover:not(:disabled){border-color:#0EA5E9;background:#F0F9FF}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--lgray);
  color:var(--gray);font-weight:800;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,color .15s}
.opt.correct{border-color:var(--correct);background:#F0FDF4}
.opt.correct .opt-letter{background:var(--correct);color:#fff}
.opt.wrong{border-color:var(--wrong);background:#FEF2F2}
.opt.wrong .opt-letter{background:var(--wrong);color:#fff}
.opt.reveal-correct{border-color:var(--correct);background:#F0FDF4}
.opt.reveal-correct .opt-letter{background:var(--correct);color:#fff}
.opt:disabled{cursor:default}

/* ── FEEDBACK ── */
.feedback{margin-top:16px;padding:12px 16px;border-radius:8px;
  font-size:.9rem;font-weight:600;display:none}
.feedback.show{display:block}
.feedback.correct{background:#DCFCE7;color:#15803D}
.feedback.wrong{background:#FEE2E2;color:#B91C1C}

/* ── NEXT BUTTON ── */
.btn-next{display:none;margin-top:20px;width:100%;padding:13px;
  border:none;border-radius:10px;background:var(--navy);color:#fff;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:background .2s;font-family:inherit}
.btn-next:hover{background:#0C4A6E}
.btn-next.show{display:block}

/* ── RESULTS ── */
.results{display:none;background:#fff;border-radius:16px;
  padding:36px 28px;box-shadow:0 4px 20px rgba(0,0,0,.09);
  text-align:center;animation:fadeIn .4s ease}
.results.show{display:block}
.score-ring{width:130px;height:130px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;margin:0 auto 20px;
  border:8px solid var(--lgray);position:relative}
.score-ring .big{font-size:2.6rem;font-weight:900;line-height:1}
.score-ring .of{font-size:.8rem;color:var(--gray);margin-top:2px}
.results h2{font-size:1.5rem;font-weight:800;color:var(--dark);margin-bottom:6px}
.results .grade{font-size:1rem;color:var(--gray);margin-bottom:24px}
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;margin-bottom:28px;text-align:left}
.bdcard{border-radius:10px;padding:14px;border:1.5px solid var(--lgray)}
.bdcard .bt{font-size:.72rem;font-weight:700;color:#fff;padding:2px 8px;
  border-radius:999px;display:inline-block;margin-bottom:6px}
.bdcard .bscore{font-size:1.3rem;font-weight:900;color:var(--dark)}
.bdcard .bof{font-size:.78rem;color:var(--gray)}
.btn-retry{padding:12px 32px;border:none;border-radius:10px;
  background:var(--navy);color:#fff;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:background .2s}
.btn-retry:hover{background:#0C4A6E}
.answer-review{margin-top:28px;text-align:left}
.answer-review h3{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:12px}
.rev-item{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:.88rem;line-height:1.5}
.rev-item.c{background:#F0FDF4;border-left:4px solid var(--correct)}
.rev-item.w{background:#FEF2F2;border-left:4px solid var(--wrong)}
.rev-item .ri{font-weight:700}
.rev-item .ra{color:var(--gray);font-size:.82rem}

footer{text-align:center;padding:20px;font-size:.78rem;color:#94A3B8}
</style>
</head>
<body>

<div class="hero">
  <h1>Web Technologies <span>Quiz</span></h1>
  <p>20 questions covering HTML, CSS, Bootstrap, React JS, Node.js &amp; MongoDB</p>
  <div class="topic-pills">
    <span class="pill" style="background:#E8511A">HTML</span>
    <span class="pill" style="background:#264DE4">CSS</span>
    <span class="pill" style="background:#7952B3">Bootstrap</span>
    <span class="pill" style="background:#0EA5E9">React JS</span>
    <span class="pill" style="background:#3C873A">Node.js</span>
    <span class="pill" style="background:#13AA52">MongoDB</span>
  </div>
</div>

<div class="shell">

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="prog-meta">
      <span class="prog-label" id="qLabel">Question 1 of 20</span>
      <span class="prog-score" id="scoreLabel">Score: 0</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:5%"></div></div>
  </div>

  <!-- Question card -->
  <div class="card" id="quizCard">
    <span class="topic-badge" id="topicBadge"></span>
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsList"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext">Next Question &rarr;</button>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="score-ring" id="scoreRing">
      <div class="big" id="finalScore">0</div>
      <div class="of">out of 20</div>
    </div>
    <h2 id="resultTitle"></h2>
    <p class="grade" id="resultGrade"></p>
    <div class="breakdown" id="breakdown"></div>
    <button class="btn-retry" onclick="startQuiz()">&#8635; Retry Quiz</button>
    <div class="answer-review" id="answerReview"></div>
  </div>

</div>

<footer>Web Technologies Architecture &mdash; Quiz &mdash; 20 Questions</footer>

<script>
const QUESTIONS = [
  // ── HTML ────────────────────────────────────────────────────
  {
    topic:"HTML", color:"#E8511A",
    q:"What does HTML stand for?",
    opts:["HyperText Markup Language","High Tech Modern Language",
          "HyperText Management Layout","Home Tool Markup Language"],
    ans:0,
    exp:"HTML stands for HyperText Markup Language — the standard language for creating web pages."
  },
  {
    topic:"HTML", color:"#E8511A",
    q:"Which HTML tag creates the largest heading on a page?",
    opts:["<h6>","<heading>","<h1>","<title>"],
    ans:2,
    exp:"<h1> is the largest heading. Headings go from <h1> (largest) down to <h6> (smallest)."
  },
  {
    topic:"HTML", color:"#E8511A",
    q:"Which HTML5 semantic tag defines the navigation links of a website?",
    opts:["<menu>","<nav>","<links>","<header>"],
    ans:1,
    exp:"<nav> is the HTML5 semantic element used to define a set of navigation links."
  },
  {
    topic:"HTML", color:"#E8511A",
    q:"Which attribute of the <a> tag specifies the URL the link points to?",
    opts:["src","link","url","href"],
    ans:3,
    exp:"The href attribute (HyperText Reference) specifies the destination URL of a hyperlink."
  },
  {
    topic:"HTML", color:"#E8511A",
    q:"Which HTML element is used to embed an image into a web page?",
    opts:["<image>","<pic>","<img>","<figure>"],
    ans:2,
    exp:"The <img> tag is used to embed images. It requires the src attribute to specify the image path."
  },
  // ── CSS ─────────────────────────────────────────────────────
  {
    topic:"CSS", color:"#264DE4",
    q:"What does CSS stand for?",
    opts:["Cascading Style Sheets","Colorful Style System",
          "Computer Style Syntax","Creative Styling Shorthand"],
    ans:0,
    exp:"CSS stands for Cascading Style Sheets — the language used to style HTML documents."
  },
  {
    topic:"CSS", color:"#264DE4",
    q:"Which CSS property changes the text color of an element?",
    opts:["font-color","text-color","color","background-color"],
    ans:2,
    exp:"The 'color' property sets the foreground (text) color. 'background-color' sets the background."
  },
  {
    topic:"CSS", color:"#264DE4",
    q:"In the CSS Box Model, which layer is the outermost?",
    opts:["Padding","Content","Border","Margin"],
    ans:3,
    exp:"The Box Model layers from inside out are: Content → Padding → Border → Margin (outermost)."
  },
  {
    topic:"CSS", color:"#264DE4",
    q:"Which CSS display value is used for a 1-dimensional (row OR column) layout?",
    opts:["display: grid","display: flex","display: table","display: block"],
    ans:1,
    exp:"Flexbox (display: flex) handles one-dimensional layouts. CSS Grid handles two-dimensional layouts."
  },
  {
    topic:"CSS", color:"#264DE4",
    q:"Which CSS selector targets an element with id='header'?",
    opts:[".header","header","*header","#header"],
    ans:3,
    exp:"The # symbol targets an ID selector. '.header' would target a class, and 'header' targets the element tag."
  },
  // ── BOOTSTRAP ───────────────────────────────────────────────
  {
    topic:"Bootstrap", color:"#7952B3",
    q:"How many columns does Bootstrap's grid system divide the screen into?",
    opts:["8","10","12","16"],
    ans:2,
    exp:"Bootstrap's grid is based on 12 columns, allowing flexible layouts like col-4 (3 equal columns)."
  },
  {
    topic:"Bootstrap", color:"#7952B3",
    q:"Which Bootstrap class applies primary-themed styling to a button?",
    opts:["btn-default","btn-main","btn-primary","btn-blue"],
    ans:2,
    exp:"'btn btn-primary' creates a primary-styled button. Bootstrap has btn-secondary, btn-success, btn-danger, etc."
  },
  {
    topic:"Bootstrap", color:"#7952B3",
    q:"What is Bootstrap primarily designed to help developers build?",
    opts:["Database schemas","Responsive, mobile-first websites",
          "Server-side APIs","Machine learning models"],
    ans:1,
    exp:"Bootstrap is a front-end CSS framework for building responsive, mobile-first websites quickly."
  },
  // ── REACT JS ─────────────────────────────────────────────────
  {
    topic:"React JS", color:"#0EA5E9",
    q:"What does JSX stand for in React?",
    opts:["Java Style XML","JavaScript XML","JSON Style Extension","JavaScript Extension"],
    ans:1,
    exp:"JSX stands for JavaScript XML — it lets you write HTML-like syntax inside JavaScript files."
  },
  {
    topic:"React JS", color:"#0EA5E9",
    q:"Which React Hook is used to add and manage state in a functional component?",
    opts:["useEffect","useContext","useReducer","useState"],
    ans:3,
    exp:"useState() is the primary hook for managing local state. e.g. const [count, setCount] = useState(0)."
  },
  {
    topic:"React JS", color:"#0EA5E9",
    q:"In React, data flows in which direction between components?",
    opts:["Bottom-up (child to parent)","Bidirectional","Top-down (parent to child)","Sideways only"],
    ans:2,
    exp:"React uses unidirectional (top-down) data flow. Parents pass data to children via props."
  },
  {
    topic:"React JS", color:"#0EA5E9",
    q:"What is the Virtual DOM in React?",
    opts:["A real browser DOM","A database for UI state",
          "A lightweight in-memory copy of the real DOM","A CSS framework"],
    ans:2,
    exp:"React's Virtual DOM is a lightweight in-memory copy of the real DOM. React diffs it to apply only the minimum changes needed, making updates faster."
  },
  // ── NODE.JS ──────────────────────────────────────────────────
  {
    topic:"Node.js", color:"#3C873A",
    q:"Node.js is built on which JavaScript engine?",
    opts:["SpiderMonkey","JavaScriptCore","V8","Chakra"],
    ans:2,
    exp:"Node.js is built on Chrome's V8 JavaScript engine, which compiles JS to native machine code for speed."
  },
  // ── MONGODB ──────────────────────────────────────────────────
  {
    topic:"MongoDB", color:"#13AA52",
    q:"In MongoDB, what is the equivalent of a SQL 'table'?",
    opts:["Document","Schema","Collection","Database"],
    ans:2,
    exp:"MongoDB uses 'Collections' instead of tables. Each collection holds multiple 'Documents' (equivalent to rows)."
  },
  {
    topic:"MongoDB", color:"#13AA52",
    q:"What format does MongoDB use to store data?",
    opts:["XML","CSV","SQL rows","BSON (Binary JSON)"],
    ans:3,
    exp:"MongoDB stores data as BSON (Binary JSON) documents — flexible, schema-free key-value pairs."
  },
];

// ── state ────────────────────────────────────────────────────────────────────
let current = 0, score = 0, answered = false;
const userAnswers = new Array(QUESTIONS.length).fill(null);

// ── DOM refs ─────────────────────────────────────────────────────────────────
const qLabel    = document.getElementById('qLabel');
const scoreLabel= document.getElementById('scoreLabel');
const progFill  = document.getElementById('progFill');
const topicBadge= document.getElementById('topicBadge');
const qNum      = document.getElementById('qNum');
const qText     = document.getElementById('qText');
const optsList  = document.getElementById('optionsList');
const feedback  = document.getElementById('feedback');
const btnNext   = document.getElementById('btnNext');
const quizCard  = document.getElementById('quizCard');
const results   = document.getElementById('results');

// ── render question ──────────────────────────────────────────────────────────
function render(){
  const q = QUESTIONS[current];
  answered = false;

  qLabel.textContent    = `Question ${current+1} of ${QUESTIONS.length}`;
  scoreLabel.textContent= `Score: ${score}`;
  progFill.style.width  = `${((current+1)/QUESTIONS.length)*100}%`;

  topicBadge.textContent     = q.topic;
  topicBadge.style.background= q.color;
  qNum.textContent  = `Question ${current+1}`;
  qText.textContent = q.q;

  optsList.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span>${opt}`;
    btn.addEventListener('click', () => selectAnswer(i));
    optsList.appendChild(btn);
  });

  feedback.className = 'feedback';
  feedback.textContent = '';
  btnNext.className = 'btn-next';
  btnNext.textContent = current === QUESTIONS.length-1 ? 'See Results' : 'Next Question →';

  // re-animate
  quizCard.style.animation='none';
  void quizCard.offsetWidth;
  quizCard.style.animation='fadeIn .3s ease';
}

// ── answer selection ─────────────────────────────────────────────────────────
function selectAnswer(chosen){
  if(answered) return;
  answered = true;
  const q = QUESTIONS[current];
  userAnswers[current] = chosen;

  const opts = optsList.querySelectorAll('.opt');
  opts.forEach(b => b.disabled = true);

  if(chosen === q.ans){
    opts[chosen].classList.add('correct');
    feedback.className = 'feedback correct show';
    feedback.textContent = '✓ Correct!  ' + q.exp;
    score++;
  } else {
    opts[chosen].classList.add('wrong');
    opts[q.ans].classList.add('reveal-correct');
    feedback.className = 'feedback wrong show';
    feedback.textContent = '✗ Not quite.  ' + q.exp;
  }

  scoreLabel.textContent = `Score: ${score}`;
  btnNext.classList.add('show');
}

// ── next ─────────────────────────────────────────────────────────────────────
btnNext.addEventListener('click', () => {
  if(!answered) return;
  current++;
  if(current < QUESTIONS.length){
    render();
  } else {
    showResults();
  }
});

// ── results ──────────────────────────────────────────────────────────────────
function showResults(){
  quizCard.style.display = 'none';
  results.classList.add('show');

  const pct = Math.round((score/QUESTIONS.length)*100);

  // score ring color
  const ring = document.getElementById('scoreRing');
  const ringColor = pct>=80 ? '#16A34A' : pct>=50 ? '#D97706' : '#DC2626';
  ring.style.borderColor = ringColor;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalScore').style.color = ringColor;

  // title & grade
  let title, grade;
  if(pct===100){title='Perfect Score! 🏆'; grade='Outstanding! You mastered all 6 topics.';}
  else if(pct>=80){title='Excellent Work! 🎉'; grade='Great understanding of web technologies!';}
  else if(pct>=60){title='Good Job! 👍'; grade='Solid foundation — review a few topics to strengthen your knowledge.';}
  else if(pct>=40){title='Keep Practicing! 📚'; grade='Review the slides and try again — you\'re getting there!';}
  else{title='Keep Learning! 💪'; grade='Go through the presentation again — you\'ll improve with practice!';}
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultGrade').textContent = grade + `  (${pct}%)`;

  // per-topic breakdown
  const topics = {};
  QUESTIONS.forEach((q,i)=>{
    if(!topics[q.topic]) topics[q.topic]={color:q.color,c:0,t:0};
    topics[q.topic].t++;
    if(userAnswers[i]===q.ans) topics[q.topic].c++;
  });
  const bdEl = document.getElementById('breakdown');
  bdEl.innerHTML = Object.entries(topics).map(([name,d])=>`
    <div class="bdcard">
      <span class="bt" style="background:${d.color}">${name}</span>
      <div class="bscore">${d.c}<span class="bof"> / ${d.t}</span></div>
    </div>`).join('');

  // answer review
  const rev = document.getElementById('answerReview');
  rev.innerHTML = '<h3>Answer Review</h3>' + QUESTIONS.map((q,i)=>{
    const ok = userAnswers[i]===q.ans;
    return `<div class="rev-item ${ok?'c':'w'}">
      <div class="ri">${i+1}. ${q.q}</div>
      <div class="ra">${ok ? '✓ Correct' : '✗ Your answer: '+q.opts[userAnswers[i]]+'  |  Correct: '+q.opts[q.ans]}</div>
    </div>`;
  }).join('');

  progFill.style.width = '100%';
  qLabel.textContent   = 'Quiz Complete!';
  scoreLabel.textContent = `Final Score: ${score} / ${QUESTIONS.length}`;
}

// ── reset ─────────────────────────────────────────────────────────────────────
function startQuiz(){
  current=0; score=0; answered=false;
  userAnswers.fill(null);
  results.classList.remove('show');
  quizCard.style.display='block';
  render();
}

// ── init ──────────────────────────────────────────────────────────────────────
startQuiz();
</script>
</body>
</html>
